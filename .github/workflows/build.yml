name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Eğer projen alt klasördeyse, working-directory belirt
    - name: Restore
      working-directory: ./KaliteKontrolApp  # ← Proje klasörünün adı
      run: dotnet restore

    - name: Publish EXE
      working-directory: ./KaliteKontrolApp  # ← Proje klasörünün adı
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ../publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KaliteKontrolApp_EXE
        path: publish
